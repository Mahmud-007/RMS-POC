# Netlify build config for the RMS frontend.
# Set VITE_API_BASE in the Netlify UI (Site settings → Environment variables)
# to your deployed backend URL, e.g. https://rms-api.onrender.com

[build]
  base = "frontend"
  command = "npm run build"
  publish = "frontend/dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
