# Render Blueprint — provisions the whole RRPS system in one deploy.
#
#   1. rrps-backend  — FastAPI + models (FREE tier; see persistence note below)
#   2. rrps-frontend — React static site (CDN, no cold start)
#
# Deploy: Render Dashboard → New → Blueprint → connect this repo.
# See DEPLOY.md for the full walkthrough.
#
# PERSISTENCE NOTE
# ----------------
# This file targets the FREE tier so it deploys on a free workspace. On free,
# the filesystem is ephemeral: the backend re-bootstraps (regenerates data +
# retrains) on every cold start, and manager corrections reset to the warm-start
# baseline. To retain accumulated learning, upgrade the backend to a paid plan
# and add a disk — uncomment the `plan: starter` + `disk:` lines below.

services:
  # ----------------------------------------------------------------------------
  # Backend API
  # ----------------------------------------------------------------------------
  - type: web
    name: rrps-backend
    runtime: python
    plan: free
    # plan: starter           # <- for persistence: switch to starter and add the disk below
    # Train during BUILD so the port binds instantly at start (Render's health
    # check times out if training blocks startup). Build-time artifacts are baked
    # into the deploy and restored on cold start.
    buildCommand: >-
      pip install -r requirements.txt &&
      python -m app.data.generator &&
      python -m app.train.train_base &&
      python -m app.train.init_sgd
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: RMS_LAT
        value: "23.9999"
      - key: RMS_LON
        value: "90.4203"
      - key: RMS_TZ
        value: "Asia/Dhaka"
    # disk:                    # <- for persistence (requires a paid plan)
    #   name: rrps-artifacts
    #   mountPath: /opt/render/project/src/artifacts
    #   sizeGB: 1

  # ----------------------------------------------------------------------------
  # Frontend static site
  # ----------------------------------------------------------------------------
  - type: web
    name: rrps-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      # Build-time. Set to the backend URL after first deploy, then redeploy.
      - key: VITE_API_BASE
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
